name: integration

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  # We can pin the version if nightly is too unstable.
  # Otherwise, we test against the latest version.
  RUST_NIGHTLY_TOOLCHAIN: nightly
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: read

jobs:
  s2n-quic-integration:
    if: github.repository_owner == 'aws'
    name: s2n-quic-integration
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
    env:
      GIT_CLONE_PROTECTION_ACTIVE: false
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Run s2n-quic integration
        working-directory: ./aws-lc-rs
        run: |
          ./scripts/run-s2n-quic-integration.sh

  rustls-integration:
    if: github.repository_owner == 'aws'
    name: rustls-integration
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-latest ]
        latest: [ 0, 1 ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Install cargo-download
        run: cargo install cargo-download cargo-show
      - name: Run rustls integration
        working-directory: ./aws-lc-rs
        run: |
          ./scripts/run-rustls-integration.sh ${{ matrix.latest == 1 && '--latest-release' }} --cleanup

  windows-debug-crt-static-test:
    if: github.repository_owner == 'aws'
    name: "Windows debug ${{ matrix.cli }} w/ crt-static Test"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        cli:
          - ''
          - '--fips'
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: run-windows-debug-crt-static-test
        working-directory: ./aws-lc-rs
        shell: bash
        run: |
          ./scripts/run-windows-debug-crt-static-test.sh ${{ matrix.cli }}

  ssl-test:
    if: github.repository_owner == 'aws'
    name: "SSL Test"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: install bindgen-cli
        run: cargo install --force --locked bindgen-cli
      - uses: ilammy/setup-nasm@v1
      - name: "Test aws-lc-sys package w/ SSL enabled"
        working-directory: ./aws-lc-sys
        run: cargo package --features ssl
      - uses: actions/setup-go@v7
        with:
          go-version: '>=1.18'
      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@v6
      - name: "Test aws-lc-fips-sys package w/ SSL enabled"
        working-directory: ./aws-lc-fips-sys
        run: cargo package --features ssl

  links-crate-tests:
    if: github.repository_owner == 'aws'
    name: sys crate tests
    runs-on: ${{ matrix.os }}
    env:
      # 'default' leaves the linkage choice to the builder; 'dynamic' forces a
      # shared-library build so the exported artifact-path metadata is
      # validated for both link kinds.
      AWS_LC_SYS_STATIC: ${{ (matrix.linkage == 'dynamic' && '0') || '' }}
      AWS_LC_FIPS_SYS_STATIC: ${{ (matrix.linkage == 'dynamic' && '0') || '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-latest, windows-latest ]
        features: [ aws-lc-rs, aws-lc-rs-fips, aws-lc-sys, aws-lc-fips-sys, aws-lc-sys-ssl, aws-lc-fips-sys-ssl ]
        linkage: [ default, dynamic ]
        include:
          # MinGW dynamic builds produce `lib*.dll.a` import libraries;
          # exercise the exported artifact-path metadata on windows-gnu.
          - os: windows-latest
            features: aws-lc-sys
            linkage: default
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            features: aws-lc-sys
            linkage: dynamic
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Install Rust target
        if: ${{ matrix.target != '' }}
        run: rustup target add ${{ matrix.target }}
      - name: Install NASM on Windows
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Setup Go >=v1.18
        uses: actions/setup-go@v7
        with:
          go-version: '>=1.18'
      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@v6
      - name: Run cargo test
        working-directory: ./links-testing
        run: cargo test --features ${{ matrix.features }} --no-default-features ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - name: Run cargo run
        working-directory: ./links-testing
        run: cargo run --features ${{ matrix.features }} --no-default-features ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  publish-dry-run-version-check:
    if: github.repository_owner == 'aws'
    name: publish dry-run version check
    runs-on: ubuntu-latest
    outputs:
      skip-aws-lc-rs: ${{ steps.check.outputs.skip-aws-lc-rs }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - uses: actions/checkout@v7
      - name: Check sys crate version compatibility
        id: check
        run: |
          # Run the compatibility check script
          if output=$(./scripts/ci/check_sys_crate_compatibility.sh 2>&1); then
            should_skip=$(echo "$output" | grep "^SHOULD_SKIP=" | cut -d'=' -f2-)
            echo "Detected: SHOULD_SKIP=$should_skip"
            echo "skip-aws-lc-rs=${should_skip}" >> $GITHUB_OUTPUT
            echo "reason=" >> $GITHUB_OUTPUT
            echo Successful publish compatibility check
            echo "$output"
            exit 0
          else
            exit_code=$?
            echo Failed publish compatibility check with exit code $exit_code
            echo "$output"

            if [ $exit_code -eq 1 ]; then
              # Script returned 1 (incompatible - should skip)
              echo "skip-aws-lc-rs=true" >> $GITHUB_OUTPUT

              # Extract skip reason from output
              skip_reason=$(echo "$output" | grep "^SKIP_REASON=" | cut -d'=' -f2-)
              echo "reason=$skip_reason" >> $GITHUB_OUTPUT
              exit 1
            else
              # Script returned 2 (error)
              echo "::error::Script execution failed with exit code $exit_code"
              exit $exit_code
            fi
          fi

  publish-dry-run-sys-crates:
    if: github.repository_owner == 'aws'
    name: publish dry-run (sys crates)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [ stable ]
        os: [ windows-latest, ubuntu-latest, macos-15-intel, macos-latest ]
        crate: [ aws-lc-sys, aws-lc-fips-sys ]
        args:
          - publish --dry-run
    steps:
      - uses: actions/setup-go@v7
        with:
          go-version: '>=1.18'
      - run: go version
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/setup-nasm@v1
      - name: Install ninja-build tool
        if: ${{ matrix.os == 'windows-latest' }}
        uses: seanmiddleditch/gha-setup-ninja@v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
          rustup default ${{ matrix.rust }}
      - name: ${{ matrix.crate }}
        working-directory: ./${{ matrix.crate }}
        run: cargo ${{ matrix.args }}
      - name: Clean
        run: cargo clean
      - name: Force Linux shared build
        env:
          AWS_LC_SYS_STATIC: 0
          AWS_LC_FIPS_SYS_STATIC: 0
        working-directory: ./${{ matrix.crate }}
        run: cargo publish --dry-run

  publish-dry-run-main-crate:
    if: github.repository_owner == 'aws' && needs.publish-dry-run-version-check.outputs.skip-aws-lc-rs != 'true'
    name: publish dry-run (aws-lc-rs)
    needs: publish-dry-run-version-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [ stable ]
        os: [ windows-latest, ubuntu-latest, macos-15-intel, macos-latest ]
        args:
          - publish --dry-run
    steps:
      - uses: actions/setup-go@v7
        with:
          go-version: '>=1.18'
      - run: go version
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/setup-nasm@v1
      - name: Install ninja-build tool
        if: ${{ matrix.os == 'windows-latest' }}
        uses: seanmiddleditch/gha-setup-ninja@v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
          rustup default ${{ matrix.rust }}
      - name: aws-lc-rs
        working-directory: ./aws-lc-rs
        run: cargo ${{ matrix.args }}
      - name: Clean
        run: cargo clean
      - name: Force Linux shared build
        env:
          AWS_LC_SYS_STATIC: 0
          AWS_LC_FIPS_SYS_STATIC: 0
        working-directory: ./aws-lc-rs
        run: cargo publish --dry-run

  ## Verify that prebuilt-nasm objects were published properly
  publish-dry-run-prebuild-nasm:
    if: github.repository_owner == 'aws'
    name: publish dry-run prebuilt-nasm
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        args:
          - publish --dry-run
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Remove NASM
        shell: bash
        run: |
          rm -f `which nasm`
      - name: Verify NASM not available
        shell: bash
        run: |
          if nasm --version; then
            echo `which nasm`
            exit 1
          else
            exit 0;
          fi
      - working-directory: ./aws-lc-sys
        shell: bash
        run: AWS_LC_SYS_PREBUILT_NASM=1 cargo publish --dry-run

  msrv:
    name: Minimum Supported Rust Version
    if: github.repository_owner == 'aws'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-15-intel, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'
          lfs: true

      - if: ${{ startsWith(matrix.os, 'macos-') }}
        run: |
          brew install llvm
          echo 'LIBCLANG_PATH=${{ (matrix.os == 'macos-15-intel' && '/usr/local') || '/opt/homebrew' }}/opt/llvm/lib' >> $GITHUB_ENV
          echo 'LLVM_CONFIG_PATH=${{ (matrix.os == 'macos-15-intel' && '/usr/local') || '/opt/homebrew' }}/opt/llvm/bin/llvm-config' >> $GITHUB_ENV
      - name: Install NASM on Windows
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # Install stable toolchain for dependency resolution. Older Cargo versions
      # cannot parse manifests that use edition 2024+, causing resolution failures
      # when any transitive dependency adopts a newer edition. Stable Cargo handles
      # all editions and its MSRV-aware resolver automatically prefers dependency
      # versions compatible with our declared rust-version.
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Install MSRV Rust version
        run: rustup toolchain install 1.71.0 --profile minimal --no-self-update

      # Use stable Cargo with MSRV-aware resolver to generate a lockfile that
      # respects our rust-version. The "fallback" policy tells Cargo to prefer
      # dependency versions compatible with rust-version, falling back to latest
      # only when no compatible version exists in the semver range.
      - name: Resolve MSRV-compatible dependencies
        run: |
          cargo +stable --config "resolver.incompatible-rust-versions='fallback'" update
          cargo +stable tree

      - name: Verify msrv
        working-directory: ./aws-lc-rs
        run: cargo +1.71.0 check --locked --features bindgen
