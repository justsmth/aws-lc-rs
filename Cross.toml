[build.dockerfile]
file = "./docker/linux-cross/Dockerfile"

# The cross-rs windows-gnu images already ship WineHQ wine-stable with the
# WineHQ apt repository configured. Do NOT `apt install winehq-stable` here:
# upgrading across major wine versions (e.g. 10.0 -> 11.0) fails with a dpkg
# file conflict between wine-stable and wine-stable-i386 (missing
# Breaks/Replaces metadata in the WineHQ packages).
[target.x86_64-pc-windows-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes nasm",
]

[target.i686-pc-windows-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes nasm",
]

[target.riscv64gc-unknown-linux-gnu.env]
passthrough = [
    'AWS_LC_SYS_CFLAGS_riscv64gc_unknown_linux_gnu'
]

[target.mips-unknown-linux-gnu]
build-std = ["std", "panic_abort"]

[target.mips-unknown-linux-musl]
build-std = ["std", "panic_abort"]
image = "ghcr.io/cross-rs/mips-unknown-linux-musl:edge"

[target.mipsel-unknown-linux-musl]
build-std = true
image = "ghcr.io/cross-rs/mipsel-unknown-linux-musl:edge"

[target.mips64-unknown-linux-muslabi64]
build-std = true
image = "ghcr.io/cross-rs/mips64-unknown-linux-muslabi64:edge"

[target.mips64el-unknown-linux-muslabi64]
build-std = true
image = "ghcr.io/cross-rs/mips64el-unknown-linux-muslabi64:edge"

[target.wasm32-unknown-emscripten.dockerfile]
file = "./docker/emscripten/Dockerfile"

[build.env]
passthrough = [
    "AWS_LC_FIPS_SYS_EXTERNAL_BINDGEN",
    "AWS_LC_FIPS_SYS_NO_PREFIX",
    "AWS_LC_FIPS_SYS_PREGENERATING_BINDINGS",
    "AWS_LC_FIPS_SYS_STATIC",
    "AWS_LC_RS_DISABLE_SLOW_TESTS",
    "AWS_LC_SYS_CC_SRC_COLLECTOR",
    "AWS_LC_SYS_CFLAGS",
    "AWS_LC_SYS_CMAKE_BUILDER",
    "AWS_LC_SYS_EXTERNAL_BINDGEN",
    "AWS_LC_SYS_NO_PREFIX",
    "AWS_LC_SYS_PREBUILT_NASM",
    "AWS_LC_SYS_PREGENERATING_BINDINGS",
    "AWS_LC_SYS_STATIC",
    "BINDGEN_EXTRA_CLANG_ARGS",
    "GOPROXY",
    "RUST_BACKTRACE",
    "RUST_LOG",
]
